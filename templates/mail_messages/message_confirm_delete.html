{% extends 'base.html' %}

{% block content %}
<h1>Удалить сообщение</h1>
<p>Вы уверены, что хотите удалить сообщение "{{ object.subject }}"?</p>
<form method="post">
    {% csrf_token %}
    <button type="submit">Удалить</button>
    <a href="{% url 'mail_messages:message_list' %}">Отмена</a>
</form>
{% endblock %}
