{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сервис рассылок</title>
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>
<body>
    <header>
        <nav>
            <a href="{% url 'home' %}">Главная</a>
            {% if user.is_authenticated %}
                <a href="{% url 'clients:client_list' %}">Клиенты</a>
                <a href="{% url 'mail_messages:message_list' %}">Сообщения</a>
                <a href="{% url 'mailings:mailing_list' %}">Рассылки</a>
                <a href="{% url 'mailings:mailing_attempt_list' %}">Попытки рассылок</a>
                <a href="{% url 'users:profile' %}">Профиль</a>
                <a href="{% url 'users:logout' %}">Выйти</a>
            {% else %}
                <a href="{% url 'users:login' %}">Войти</a>
                <a href="{% url 'users:register' %}">Регистрация</a>
            {% endif %}
        </nav>
    </header>
    <main>
        {% block content %}
        {% endblock %}
    </main>
    <footer>
        <p>&copy; 2023 Сервис рассылок</p>
    </footer>
</body>
</html>
